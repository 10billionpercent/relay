services:
  backend:
    build: .
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_PATH=/app/data/chatbot.db
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./data:/app/data
    command: npm run dev:backend

  frontend:
    build: .
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:3001
    command: npm run dev:frontend
