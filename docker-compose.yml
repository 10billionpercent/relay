version: '3.8'

services:
  backend:
    build: .
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_PATH=/app/data/chatbot.db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./data:/app/data
    command: npm run dev:backend

  frontend:
    build: .
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev:frontend